name: Print Inputs Example

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: "Select environment"
        required: true
        type: environment

      version:
        description: "App version"
        required: true
        default: "v1.0.0"

      deploy_notes:
        description: "Release notes"
        required: false

jobs:
  print-inputs:
    runs-on: ubuntu-latest

    # attach selected environment
    environment:
      name: ${{ inputs.target_env }}

    steps:
      - name: Print individual inputs
        run: |
          echo "Environment: ${{ inputs.target_env }}"
          echo "Version: ${{ inputs.version }}"
          echo "Notes: ${{ inputs.deploy_notes }}"

      - name: Print all inputs as JSON
        run: |
          echo '${{ toJSON(inputs) }}'